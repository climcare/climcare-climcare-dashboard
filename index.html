<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Clim Care Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #eef2f3; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #27ae60; margin-bottom: 5px; }
        #status { font-size: 0.8em; color: #7f8c8d; margin-bottom: 20px; }
        .card { background: #f9f9f9; border-radius: 15px; padding: 15px; margin: 10px; display: inline-block; width: 120px; border: 1px solid #eee; }
        .label { font-size: 0.9em; color: #7f8c8d; text-transform: uppercase; }
        .value { font-size: 1.8em; font-weight: bold; color: #2c3e50; margin-top: 5px; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; cursor: pointer; font-size: 1em; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .connect { background: #27ae60; color: white; }
        .connect:active { background: #1e8449; }
        .reset { background: white; color: #e74c3c; border: 2px solid #e74c3c; margin-top: 20px; font-size: 0.8em; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Clim Care</h1>
    <div id="status">Aguardando conexão...</div>
    
    <div class="card">
        <div class="label">Temperatura</div>
        <div id="temp" class="value">--</div>
    </div>
    <div class="card">
        <div class="label">Umidade</div>
        <div id="umid" class="value">--</div>
    </div>

    <button class="btn connect" onclick="conectar()">CONECTAR DISPOSITIVO</button>
    <button class="btn reset" onclick="enviarReset()">RESETAR CONFIGURAÇÕES WI-FI</button>
</div>

<script>
    let caracteristica;

    async function conectar() {
        const statusDiv = document.getElementById('status');
        try {
            statusDiv.innerText = "Buscando ClimCare-Diag...";
            const dispositivo = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'ClimCare-Diag' }],
                optionalServices: ['181a']
            });

            statusDiv.innerText = "Conectando ao GATT...";
            const servidor = await dispositivo.gatt.connect();
            
            statusDiv.innerText = "Buscando Serviço...";
            const servico = await servidor.getPrimaryService('181a');
            
            statusDiv.innerText = "Lendo Sensores...";
            caracteristica = await servico.getCharacteristic('2a58');

            await caracteristica.startNotifications();
            statusDiv.innerText = "Monitorando em Tempo Real ✅";
            statusDiv.style.color = "#27ae60";

            caracteristica.addEventListener('characteristicvaluechanged', (event) => {
                const decoder = new TextDecoder('utf-8');
                const texto = decoder.decode(event.target.value);
                
                // Regex robusta para capturar números mesmo com variações de texto
                const tempMatch = texto.match(/T\s*:\s*([\d.]+)/i);
                const umidMatch = texto.match(/U\s*:\s*([\d.]+)/i);

                if (tempMatch) document.getElementById('temp').innerText = tempMatch[1] + "°C";
                if (umidMatch) document.getElementById('umid').innerText = umidMatch[1] + "%";
            });

            dispositivo.addEventListener('gattserverdisconnected', () => {
                statusDiv.innerText = "Dispositivo Desconectado ❌";
                statusDiv.style.color = "#e74c3c";
            });

        } catch (erro) {
            console.error(erro);
            statusDiv.innerText = "Erro: " + erro.message;
            statusDiv.style.color = "#e74c3c";
        }
    }

    async function enviarReset() {
        if (!caracteristica) return alert("Conecte via Bluetooth primeiro!");
        if (confirm("Deseja realmente apagar as redes Wi-Fi salvas no Clim Care?")) {
            try {
                const encoder = new TextEncoder();
                await caracteristica.writeValue(encoder.encode("RESET"));
                alert("Comando enviado! O dispositivo irá reiniciar.");
            } catch (e) {
                alert("Erro ao enviar comando: " + e.message);
            }
        }
    }
</script>
</body>
</html>
