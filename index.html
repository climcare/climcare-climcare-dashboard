<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Clim Care Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; text-align: center; padding: 20px; }
        .box { max-width: 380px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        h1 { color: #2ecc71; }
        .val { font-size: 2.5em; font-weight: bold; color: #34495e; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .primary { background: #2ecc71; color: white; }
        .secondary { background: #3498db; color: white; margin-top: 20px; }
        input { width: 85%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Clim Care</h1>
        <p id="st">Bluetooth Desconectado</p>
        <div style="display:flex; justify-content: space-around;">
            <div><small>TEMP</small><div id="t" class="val">--</div></div>
            <div><small>UMID</small><div id="u" class="val">--</div></div>
        </div>
        <button class="btn primary" onclick="conectar()">CONECTAR VIA BLE</button>
        <div style="margin-top:20px; border-top: 1px dashed #ccc; padding-top:15px;">
            <input type="text" id="s" placeholder="Nome do Wi-Fi">
            <input type="password" id="p" placeholder="Senha do Wi-Fi">
            <button class="btn secondary" onclick="enviarWifi()">CONFIGURAR WI-FI</button>
        </div>
    </div>
    <script>
        let c;
        async function conectar() {
            const d = await navigator.bluetooth.requestDevice({filters: [{name:'ClimCare-Diag'}], optionalServices: [0x181A]});
            const s = await d.gatt.connect();
            const sv = await s.getPrimaryService(0x181A);
            c = await sv.getCharacteristic(0x2A58);
            await c.startNotifications();
            document.getElementById('st').innerText = "Conectado ✅";
            c.addEventListener('characteristicvaluechanged', (e) => {
                const txt = new TextDecoder().decode(e.target.value);
                const t = txt.match(/T:([\d.]+)/);
                const u = txt.match(/U:([\d.]+)/);
                if(t) document.getElementById('t').innerText = t[1]+"°";
                if(u) document.getElementById('u').innerText = u[1]+"%";
            });
        }
        async function enviarWifi() {
            const m = `WIFI:${document.getElementById('s').value},${document.getElementById('p').value}`;
            await c.writeValue(new TextEncoder().encode(m));
            alert("Enviado!");
        }
    </script>
</body>
</html>
