<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clim Care Dashboard - Real-Time</title>
    <style>
        :root {
            --bg-deep: #0b1d16; /* Fundo escuro conforme imagem */
            --clinico-light: #4ade80; /* Verde menta saúde */
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(74, 222, 128, 0.2);
            --text-silver: #cbd5e1;
            --alert-red: #e63946;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at top, #143628 0%, #0b1d16 100%);
            color: white; margin: 0; padding: 15px;
            display: flex; justify-content: center;
        }

        .app-container { max-width: 450px; width: 100%; }

        /* Estilo dos Grupos (conforme imagem de referência) */
        .main-group {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px; padding: 20px;
            margin-bottom: 15px; backdrop-filter: blur(10px);
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
        }

        .label { font-size: 10px; text-transform: uppercase; color: var(--text-silver); }
        .value { font-size: 22px; font-weight: bold; display: block; margin: 4px 0; }
        
        /* Área de Alerta Dinâmica */
        .alert-box {
            display: none; /* Só aparece se houver anomalia */
            background: rgba(230, 57, 70, 0.15);
            border: 1px solid var(--alert-red);
            border-radius: 20px; padding: 15px;
            margin-bottom: 15px; animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; }
        }

        .footer-card {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            padding: 15px; border-radius: 20px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header style="text-align:center; margin-bottom:20px;">
        <h1 style="font-size: 24px; margin:0;">Qualidade do Ar</h1>
        <p style="font-size: 12px; color: var(--text-silver);">Monitoramento em Tempo Real</p>
    </header>

    <div id="alertArea" class="alert-box">
        <div style="font-weight: bold; font-size: 14px;">⚠️ ALERTA DE ANOMALIA</div>
        <div id="alertMsg" style="font-size: 12px;">Verificando indicadores...</div>
    </div>

    <div class="main-group">
        <div>
            <span class="label">🌡️ Temperatura</span>
            <span id="temp-val" class="value">--°C</span>
        </div>
        <div style="border-left: 1px solid var(--glass-border); padding-left:15px;">
            <span class="label">💧 Umidade</span>
            <span id="hum-val" class="value">--%</span>
        </div>
    </div>

    <div class="main-group">
        <div>
            <span class="label">☁️ CO₂</span>
            <span id="co2-val" class="value">-- ppm</span>
        </div>
        <div style="border-left: 1px solid var(--glass-border); padding-left:15px;">
            <span class="label">🌫️ PM2.5</span>
            <span id="pm25-val" class="value">-- µg/m³</span>
        </div>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
        <div class="footer-card">
            <span class="label">🔊 Ruído</span>
            <span id="noise-val" class="value">-- dB</span>
        </div>
        <div class="footer-card">
            <span class="label">🔋 Bateria</span>
            <span id="batt-val" class="value">--%</span>
        </div>
    </div>
</div>

<script>
    // Configurações do seu backend 
    const API_GET_URL = "https://climcare.vbweb.com.br/api/readings/latest"; 
    const DEVICE_ID = 11; // ID definido no simulador 

    async function fetchData() {
        try {
            // No mundo real, aqui você faria a chamada ao seu SaaS
            const response = await fetch(`\${API_GET_URL}?deviceId=\${DEVICE_ID}`);
            const data = await response.json();

            // Atualiza a interface com os nomes de variáveis do seu IoT 
            document.getElementById('temp-val').innerText = `\${data.temperature}°C`;
            document.getElementById('hum-val').innerText = `\${data.humidity}%`;
            document.getElementById('co2-val').innerText = `\${data.co2} ppm`;
            document.getElementById('pm25-val').innerText = `\${data.pm25} µg/m³`;
            document.getElementById('noise-val').innerText = `\${data.noise} dB`;
            document.getElementById('batt-val').innerText = `\${data.battery}%`;

            // Lógica de Alerta Automático
            checkAnomalies(data);

        } catch (error) {
            console.log("Aguardando dados do dispositivo...");
        }
    }

    function checkAnomalies(data) {
        const alertArea = document.getElementById('alertArea');
        const alertMsg = document.getElementById('alertMsg');

        // Exemplo: Alerta se CO2 > 1000 ou Temp > 35 (Cenários do simulador) 
        if (data.co2 > 1000 || data.temperature > 35) {
            alertArea.style.display = 'block';
            alertMsg.innerText = data.co2 > 1000 ? "Nível de CO₂ Crítico! Ventile o ambiente." : "Temperatura elevada detectada.";
        } else {
            alertArea.style.display = 'none';
        }
    }

    // Atualiza a cada 5 segundos para simular tempo real
    setInterval(fetchData, 5000);
    fetchData(); // Chamada inicial
</script>
</body>
</html>
