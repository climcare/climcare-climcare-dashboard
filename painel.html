<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clim Care | Monitoramento Biológico</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg: #0b0e14;
            --card-bg: #161b22;
            --primary: #3fb950;
            --text: #c9d1d9;
            --danger: #ff4444;
            --warning: #ffbb33;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: background 0.5s; overflow-x: hidden; }
        
        /* ALERTA CRÍTICO PISCANTE */
        .alarm-active { animation: bg-panic 1.5s infinite; }
        @keyframes bg-panic { 0% { background-color: #0b0e14; } 50% { background-color: #330000; } 100% { background-color: #0b0e14; } }

        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            max-width: 1200px; margin: 0 auto 10px auto;
            background: var(--card-bg); padding: 15px 25px; border-radius: 12px; border: 1px solid #30363d;
        }

        .brand { color: var(--primary); font-weight: bold; font-size: 1.2rem; letter-spacing: 1px; }
        .clock { font-size: 1.8rem; font-weight: 800; color: var(--primary); font-family: 'Courier New', monospace; }

        #system-log { 
            max-width: 1200px; margin: 0 auto 15px auto; text-align: center; 
            font-size: 0.85rem; color: #8b949e; text-transform: uppercase;
        }
        .log-error { color: var(--danger) !important; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        #health-alert {
            max-width: 1200px; margin: 0 auto 20px auto; padding: 20px;
            border-radius: 12px; display: none; text-align: center;
            font-weight: bold; border: 2px solid var(--danger);
            background: rgba(255, 68, 68, 0.15); color: #fff;
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.2);
        }

        .grid { display: grid; max-width: 1200px; margin: 0 auto; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        
        .card { 
            background: var(--card-bg); border: 1px solid #30363d; padding: 25px; 
            border-radius: 12px; transition: 0.4s;
        }
        .card.danger { border-color: var(--danger) !important; background: rgba(255, 68, 68, 0.05); }

        .card-label { font-size: 0.8rem; color: #8b949e; text-transform: uppercase; margin-bottom: 12px; font-weight: 600; }
        .card-value { font-size: 3.2rem; font-weight: 800; color: #f0f6fc; }
        .unit { font-size: 1.2rem; color: #8b949e; margin-left: 4px; }
        
        .chart-container { grid-column: 1 / -1; background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid #30363d; height: 380px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand"><i class="fa-solid fa- bacteria"></i> CLIM CARE | BIOGUARD</div>
        <div class="clock" id="clock">00:00:00</div>
        <div><i class="fa-solid fa-wifi" style="color:var(--primary)"></i> <span id="rssi">--</span> dBm</div>
    </div>

    <div id="system-log">Sincronizando com dispositivo...</div>

    <div id="health-alert">
        <div style="font-size: 1.4rem; margin-bottom: 5px;"><i class="fa-solid fa-biohazard"></i> ALERTA CRÍTICO</div>
        <div id="alert-details" style="font-size: 1rem; font-weight: 400;">Ambiente fora dos padrões de segurança biológica.</div>
    </div>

    <div class="grid">
        <div class="card" id="card-temp">
            <div class="card-label">Temperatura Ambiente</div>
            <div class="card-value"><span id="temp">--</span><span class="unit">°C</span></div>
        </div>
        <div class="card" id="card-humi">
            <div class="card-label">Umidade Relativa</div>
            <div class="card-value"><span id="humi">--</span><span class="unit">%</span></div>
        </div>
        <div class="card">
            <div class="card-label">Status de Energia</div>
            <div class="card-value"><span id="batt">--</span><span class="unit">%</span></div>
        </div>

        <div class="chart-container">
            <canvas id="mainChart"></canvas>
        </div>
    </div>

    <script>
        // Relógio
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);

        // Firebase
        const firebaseConfig = { databaseURL: "https://climcare-e55b7-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref("devices/10");

        // Gráfico
        const ctx = document.getElementById('mainChart').getContext('2d');
        const mainChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'Temp (°C)', data: [], borderColor: '#ff4444', backgroundColor: 'rgba(255, 68, 68, 0.1)', fill: true, tension: 0.4 },
                { label: 'Umid (%)', data: [], borderColor: '#38bdf8', backgroundColor: 'rgba(56, 189, 248, 0.1)', fill: true, tension: 0.4 }
            ]},
            options: { 
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#c9d1d9' } } },
                scales: { 
                    y: { grid: { color: '#30363d' }, ticks: { color: '#8b949e' } },
                    x: { ticks: { color: '#8b949e' } }
                }
            }
        });

        function checkHealth(t, h, status) {
            let messages = [];
            let isPanic = false;

            // Se o status indica erro de hardware, mostramos o alerta técnico prioritário
            if (status && status.includes("ERRO")) {
                messages.push("FALHA TÉCNICA: " + status);
                isPanic = true;
            } else {
                // Validação OMS / ANVISA
                if (t > 24) messages.push("Temperatura Elevada: Risco de proliferação bacteriana.");
                if (t < 20) messages.push("Temperatura Baixa: Fora do conforto térmico hospitalar.");
                if (h < 40) messages.push("Umidade Crítica: Ar seco (Risco de infecções e ressecamento).");
                if (h > 60) messages.push("Umidade Elevada: Risco de fungos e ácaros.");
                
                if (messages.length > 0) isPanic = true;
            }

            const alertDiv = document.getElementById('health-alert');
            const detailsDiv = document.getElementById('alert-details');

            if (isPanic) {
                alertDiv.style.display = 'block';
                detailsDiv.innerHTML = messages.join("<br>");
                document.body.classList.add('alarm-active');
                if(t > 24 || t < 20) document.getElementById('card-temp').classList.add('danger');
                if(h > 60 || h < 40) document.getElementById('card-humi').classList.add('danger');
            } else {
                alertDiv.style.display = 'none';
                document.body.classList.remove('alarm-active');
                document.getElementById('card-temp').classList.remove('danger');
                document.getElementById('card-humi').classList.remove('danger');
            }
        }

        db.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const t = data.temperature || 0;
                const h = data.humidity || 0;
                const st = data.status || "Operando";

                document.getElementById('temp').innerText = t.toFixed(1);
                document.getElementById('humi').innerText = h.toFixed(1);
                document.getElementById('batt').innerText = data.battery || 0;
                document.getElementById('rssi').innerText = data.rssi || 0;

                const log = document.getElementById('system-log');
                log.innerText = "STATUS ATUAL: " + st;
                log.className = st.includes("ERRO") ? "log-error" : "";

                checkHealth(t, h, st);

                const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                if (mainChart.data.labels.length > 15) {
                    mainChart.data.labels.shift();
                    mainChart.data.datasets[0].data.shift();
                    mainChart.data.datasets[1].data.shift();
                }
                mainChart.data.labels.push(time);
                mainChart.data.datasets[0].data.push(t);
                mainChart.data.datasets[1].data.push(h);
                mainChart.update('none');
            }
        });
    </script>
</body>
</html>
