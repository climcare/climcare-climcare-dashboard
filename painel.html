<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clim Care | Monitoramento Realtime</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        :root { --primary: #27ae60; --dark: #2c3e50; --bg: #ecf0f1; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--dark); }
        .container { max-width: 600px; margin: auto; }
        .header { text-align: center; padding: 20px; background: white; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .header h1 { color: var(--primary); margin: 0; font-size: 1.8rem; }
        .status-dot { height: 10px; width: 10px; background-color: #bbb; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background-color: #2ecc71; box-shadow: 0 0 10px #2ecc71; animation: pulse 2s infinite; }
        
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(46, 204, 113, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card i { font-size: 2rem; color: #3498db; margin-bottom: 10px; }
        .card .val { font-size: 2.5rem; font-weight: bold; display: block; }
        .card .label { font-size: 0.9rem; color: #7f8c8d; text-transform: uppercase; }

        .info-footer { margin-top: 20px; background: #fff; padding: 15px; border-radius: 15px; font-size: 0.8rem; color: #7f8c8d; text-align: center; }
        .log-json { background: #2d3436; color: #00ff00; padding: 10px; border-radius: 10px; font-family: monospace; font-size: 0.7rem; text-align: left; margin-top: 15px; overflow: hidden; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1><i class="fa-solid fa-satellite-dish"></i> Clim Care Cloud</h1>
        <p><span id="dot" class="status-dot"></span> <span id="status-text">Conectando ao Firebase...</span></p>
    </div>

    <div class="grid">
        <div class="card">
            <i class="fa-solid fa-temperature-three-quarters" style="color: #e67e22;"></i>
            <span class="val" id="t">--.-°</span>
            <span class="label">Temperatura</span>
        </div>
        <div class="card">
            <i class="fa-solid fa-droplet" style="color: #3498db;"></i>
            <span class="val" id="u">--.-%</span>
            <span class="label">Umidade</span>
        </div>
    </div>

    <div class="info-footer">
        Dispositivo: <strong id="devId">CLIM-01</strong><br>
        Sincronização: <span id="time">Realtime Ativo</span>
        <div id="json-preview" class="log-json">Aguardando dados...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

    // Sua configuração exata
    const firebaseConfig = {
        databaseURL: "https://climcare-e55b7-default-rtdb.firebaseio.com/"
    };

    // Inicializa Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const sensorRef = ref(db, 'dispositivos/CLIM-01');

    // Escuta em tempo real (Sem refresh!)
    onValue(sensorRef, (snapshot) => {
        const data = snapshot.val();
        
        if (data) {
            // Atualiza Interface
            document.getElementById('t').innerText = data.temperatura.toFixed(1) + "°";
            document.getElementById('u').innerText = data.umidade.toFixed(1) + "%";
            
            // Status Visual
            document.getElementById('dot').classList.add('online');
            document.getElementById('status-text').innerText = "Monitoramento em Tempo Real";
            
            // Update Time
            const agora = new Date();
            document.getElementById('time').innerText = "Atualizado às " + agora.toLocaleTimeString();

            // Preview do JSON (bom para provar que é IoT real na feira)
            document.getElementById('json-preview').innerText = JSON.stringify(data);
        }
    }, (error) => {
        console.error(error);
        document.getElementById('status-text').innerText = "Erro de conexão";
        document.getElementById('dot').classList.remove('online');
    });
</script>

</body>
</html>
