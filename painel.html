<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clim Care | Monitoramento Biológico</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg: #0b0e14;
            --card-bg: #161b22;
            --primary: #3fb950;
            --text: #c9d1d9;
            --danger: #ff4444;
            --warning: #ffbb33;
        }

        body { font-family: -apple-system, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: background 0.5s; }
        
        .alarm-active { animation: bg-panic 1.5s infinite; }
        @keyframes bg-panic { 0% { background-color: #0b0e14; } 50% { background-color: #2a0a0a; } 100% { background-color: #0b0e14; } }

        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            max-width: 1200px; margin: 0 auto 10px auto;
            background: var(--card-bg); padding: 15px 25px; border-radius: 12px; border: 1px solid #30363d;
        }

        .brand { color: var(--primary); font-weight: bold; font-size: 1.2rem; letter-spacing: 1px; }
        .clock { font-size: 1.8rem; font-weight: 800; color: var(--primary); font-family: monospace; }

        /* Status Badge e Botão Reset */
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; margin-right: 10px; }
        .online { background: rgba(63, 185, 80, 0.2); color: var(--primary); border: 1px solid var(--primary); }
        .offline { background: rgba(235, 71, 82, 0.2); color: var(--danger); border: 1px solid var(--danger); animation: blink 1s infinite; }
        
        .btn-reset { 
            background: #21262d; color: #ff7b72; border: 1px solid #30363d; padding: 8px 15px; 
            border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: bold; transition: 0.3s;
        }
        .btn-reset:hover { background: var(--danger); color: white; }

        #system-log { max-width: 1200px; margin: 0 auto 15px auto; text-align: center; font-size: 0.8rem; color: #8b949e; }
        .log-error { color: var(--danger) !important; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        #health-alert {
            max-width: 1200px; margin: 0 auto 20px auto; padding: 20px;
            border-radius: 12px; display: none; text-align: center;
            border: 2px solid var(--danger); background: rgba(255, 68, 68, 0.1); color: #fff;
        }

        .grid { display: grid; max-width: 1200px; margin: 0 auto; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; transition: 0.5s; }
        .data-stale { opacity: 0.4; filter: grayscale(1); } /* Visual para quando estiver offline */

        .card { background: var(--card-bg); border: 1px solid #30363d; padding: 25px; border-radius: 12px; transition: 0.4s; }
        .card.danger { border-color: var(--danger) !important; box-shadow: 0 0 15px rgba(255, 68, 68, 0.2); }
        .card-label { font-size: 0.8rem; color: #8b949e; text-transform: uppercase; margin-bottom: 12px; }
        .card-value { font-size: 3.2rem; font-weight: 800; color: #f0f6fc; }
        
        .chart-container { grid-column: 1 / -1; background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid #30363d; height: 350px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand">MONITORAMENTO INTELIGENTE DA QUALIDADE DO AR INTERNO</div>
        <div style="display: flex; align-items: center;">
            <div id="connection-status" class="status-badge offline">Aguardando...</div>
            <button class="btn-reset" onclick="triggerReset()"><i class="fa-solid fa-rotate"></i> RESET</button>
        </div>
        <div class="clock" id="clock">00:00:00</div>
        <div><i class="fa-solid fa-wifi" style="color:var(--primary)"></i> <span id="rssi">--</span> dBm</div>
    </div>

    <div id="system-log">Sincronizando...</div>

    <div id="health-alert">
        <div style="font-size: 1.3rem; font-weight: bold; margin-bottom: 8px;">
            <i class="fa-solid fa-circle-exclamation"></i> ANOMALIA AMBIENTAL DETECTADA
        </div>
        <div id="alert-details" style="font-size: 1rem; line-height: 1.5; color: #ffbaba;"></div>
    </div>

    <div class="grid" id="main-grid">
        <div class="card" id="card-temp">
            <div class="card-label">Temperatura</div>
            <div class="card-value"><span id="temp">--</span><small style="font-size: 1.2rem; color: #8b949e;">°C</small></div>
        </div>
        <div class="card" id="card-humi">
            <div class="card-label">Umidade</div>
            <div class="card-value"><span id="humi">--</span><small style="font-size: 1.2rem; color: #8b949e;">%</small></div>
        </div>
        <div class="card">
            <div class="card-label">Bateria</div>
            <div class="card-value"><span id="batt">--</span><small style="font-size: 1.2rem; color: #8b949e;">%</small></div>
        </div>

        <div class="chart-container">
            <canvas id="mainChart"></canvas>
        </div>
    </div>

    <script>
        let lastUpdateTimestamp = 0;
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        const firebaseConfig = { databaseURL: "https://climcare-e55b7-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref("devices/10");

        // Função de Reset
        function triggerReset() {
            if(confirm("Deseja reiniciar o dispositivo remotamente?")) {
                db.update({ cmd: 1 }).then(() => alert("Comando enviado!"));
            }
        }

        const ctx = document.getElementById('mainChart').getContext('2d');
        const mainChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'Temp', data: [], borderColor: '#ff4444', tension: 0.4 },
                { label: 'Umid', data: [], borderColor: '#38bdf8', tension: 0.4 }
            ]},
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { grid: { color: '#30363d' } } } }
        });

        function checkHealth(t, h, st) {
            let messages = [];
            let isPanic = false;

            if (t > 24) messages.push("<b>TEMPERATURA ALTA:</b> Risco de fadiga térmica e aceleração metabólica bacteriana.");
            if (t < 20 && t > 0) messages.push("<b>TEMPERATURA BAIXA:</b> Desconforto térmico e risco de choque respiratório.");
            if (h < 40 && h > 0) messages.push("<b>UMIDADE CRÍTICA (AR SECO):</b> Risco de infecções virais e ressecamento de mucosas.");
            if (h > 60) messages.push("<b>UMIDADE ELEVADA:</b> Propício para proliferação de fungos, mofo e ácaros.");

            if (st && st.includes("ERRO")) {
                messages.push("<b>FALHA NO DISPOSITIVO:</b> Verifique a conexão física do sensor DHT11.");
                isPanic = true;
            }

            const alertDiv = document.getElementById('health-alert');
            const detailsDiv = document.getElementById('alert-details');

            if (messages.length > 0) {
                alertDiv.style.display = 'block';
                detailsDiv.innerHTML = messages.join("<br>");
                document.body.classList.add('alarm-active');
                if (t > 24 || t < 20) document.getElementById('card-temp').classList.add('danger');
                if (h > 60 || h < 40) document.getElementById('card-humi').classList.add('danger');
            } else {
                alertDiv.style.display = 'none';
                document.body.classList.remove('alarm-active');
                document.getElementById('card-temp').classList.remove('danger');
                document.getElementById('card-humi').classList.remove('danger');
            }
        }

        db.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                lastUpdateTimestamp = Date.now();
                const t = data.temperature || 0;
                const h = data.humidity || 0;
                const st = data.status || "Operacional";

                document.getElementById('temp').innerText = t.toFixed(1);
                document.getElementById('humi').innerText = h.toFixed(1);
                document.getElementById('batt').innerText = data.battery || 0;
                document.getElementById('rssi').innerText = data.rssi || 0;

                // Status de Conexão Ativo
                const statusBadge = document.getElementById('connection-status');
                statusBadge.innerText = "SISTEMA ATIVO";
                statusBadge.className = "status-badge online";
                document.getElementById('main-grid').classList.remove('data-stale');

                const log = document.getElementById('system-log');
                log.innerText = "SISTEMA: " + st;
                log.className = st.includes("ERRO") ? "log-error" : "";

                checkHealth(t, h, st);

                const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                if (mainChart.data.labels.length > 15) {
                    mainChart.data.labels.shift();
                    mainChart.data.datasets[0].data.shift();
                    mainChart.data.datasets[1].data.shift();
                }
                mainChart.data.labels.push(time);
                mainChart.data.datasets[0].data.push(t);
                mainChart.data.datasets[1].data.push(h);
                mainChart.update('none');
            }
        });

        // Watchdog Visual: Detecta se o dispositivo parou de enviar dados (mais de 45 segundos)
        setInterval(() => {
            if (lastUpdateTimestamp > 0) {
                const diff = (Date.now() - lastUpdateTimestamp) / 1000;
                if (diff > 400) {
                    const statusBadge = document.getElementById('connection-status');
                    statusBadge.innerText = "SISTEMA OFFLINE";
                    statusBadge.className = "status-badge offline";
                    document.getElementById('main-grid').classList.add('data-stale');
                    document.getElementById('system-log').innerText = "AVISO: Dispositivo perdeu a conexão com a nuvem.";
                }
            }
        }, 10000);
    </script>
</body>
</html>
