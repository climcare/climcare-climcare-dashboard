<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clim Care | Live Industrial Dashboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #38bdf8;
            --secondary: #818cf8;
            --text: #f1f5f9;
            --success: #22c55e;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto 30px auto;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 20px;
        }

        .brand h1 { margin: 0; font-size: 1.8rem; letter-spacing: -1px; color: var(--primary); }
        .status-badge {
            background: rgba(34, 197, 94, 0.2);
            color: var(--success);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pulse {
            width: 8px; height: 8px; background: var(--success);
            border-radius: 50%; box-shadow: 0 0 0 rgba(34, 197, 94, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }

        .grid {
            display: grid;
            max-width: 1200px;
            margin: 0 auto;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 16px;
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-5px); border-color: var(--primary); }

        .card-header { display: flex; justify-content: space-between; color: #94a3b8; font-size: 0.9rem; }
        .card-value { font-size: 3rem; font-weight: 800; margin: 15px 0; display: flex; align-items: baseline; gap: 5px; }
        .card-unit { font-size: 1.2rem; color: #64748b; }

        .chart-main {
            grid-column: 1 / -1;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            height: 400px;
        }

        footer { text-align: center; margin-top: 40px; color: #64748b; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand">
            <h1>CLIM CARE <small style="font-size: 0.5em; color: #64748b;">v1.0</small></h1>
        </div>
        <div id="connection-status" class="status-badge">
            <div class="pulse"></div> LIVE DATA
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <div class="card-header">TEMPERATURA <i class="fa-solid fa-temperature-half"></i></div>
            <div class="card-value"><span id="temp">--</span><span class="card-unit">°C</span></div>
            <div id="temp-trend" style="font-size: 0.8rem;">Monitoramento estável</div>
        </div>

        <div class="card">
            <div class="card-header">UMIDADE RELATIVA <i class="fa-solid fa-droplet"></i></div>
            <div class="card-value"><span id="humi">--</span><span class="card-unit">%</span></div>
            <div style="font-size: 0.8rem;">Ar em ambiente confinado</div>
        </div>

        <div class="card">
            <div class="card-header">BATERIA <i class="fa-solid fa-battery-three-quarters"></i></div>
            <div class="card-value"><span id="batt">--</span><span class="card-unit">%</span></div>
            <div id="batt-status" style="font-size: 0.8rem;">Alimentação OK</div>
        </div>

        <div class="chart-main">
            <canvas id="liveChart"></canvas>
        </div>
    </div>

    <footer>
        Sistema Clim Care - Feira de Tecnologia 2026 | ID: 10
    </footer>

    <script>
        // CONFIGURAÇÃO FIREBASE
        const firebaseConfig = { databaseURL: "https://climcare-e55b7-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref("devices/10");

        // CONFIGURAÇÃO DO GRÁFICO (CHART.JS)
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.font.family = 'Inter';
        
        const ctx = document.getElementById('liveChart').getContext('2d');
        const liveChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Temperatura',
                    data: [],
                    borderColor: '#38bdf8',
                    backgroundColor: 'rgba(56, 189, 248, 0.1)',
                    fill: true,
                    tension: 0.4,
                    borderWidth: 3,
                    pointRadius: 0
                },
                {
                    label: 'Umidade',
                    data: [],
                    borderColor: '#818cf8',
                    backgroundColor: 'rgba(129, 140, 248, 0.1)',
                    fill: true,
                    tension: 0.4,
                    borderWidth: 3,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: true, position: 'top' } },
                scales: {
                    x: { grid: { display: false } },
                    y: { grid: { color: 'rgba(255,255,255,0.05)' } }
                }
            }
        });

        // ESCUTADOR EM TEMPO REAL (SEM RELOAD)
        db.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // 1. Atualiza os números (Cards) com animação suave
                document.getElementById('temp').innerText = data.temperature.toFixed(1);
                document.getElementById('humi').innerText = data.humidity.toFixed(1);
                document.getElementById('batt').innerText = data.battery;

                // 2. Alerta visual de bateria baixa
                const battLabel = document.getElementById('batt-status');
                if(data.battery < 20) {
                    battLabel.innerText = "CRÍTICO: CARREGAR!";
                    battLabel.style.color = "#ef4444";
                }

                // 3. Atualiza o gráfico em tempo real
                const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
