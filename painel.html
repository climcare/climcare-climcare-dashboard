<!DOCTYPE html>
<html>
<head>
    <title>Clim Care - Dashboard Realtime</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 15px; display: inline-block; margin: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); min-width: 200px; }
        .value { font-size: 2em; font-weight: bold; color: #2c3e50; }
        .unit { font-size: 0.5em; }
    </style>
</head>
<body>
    <h1>Monitoramento Clim Care</h1>
    <div class="card">
        <div>Temperatura</div>
        <div class="value" id="temp">--</div><span class="unit">°C</span>
    </div>
    <div class="card">
        <div>Umidade</div>
        <div class="value" id="humi">--</div><span class="unit">%</span>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://climcare-e55b7-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref("devices/10"); // "10" é o seu DEVICE_ID [cite: 2]

        db.on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                document.getElementById('temp').innerText = data.temperature;
                document.getElementById('humi').innerText = data.humidity;
            }
        });
    </script>
</body>
</html>
